repos:
  - repo: https://github.com/psf/black
    rev: 24.12.0
    hooks:
      - id: black
        language_version: python3.11

  - repo: https://github.com/pycqa/ruff
    rev: v0.1.0
    hooks:
      - id: ruff
        args: ["check", "--fix"]
        language_version: python3.11

  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: ["--profile", "black"]

  - repo: https://github.com/PyCQA/pydocstyle
    rev: 6.9.0
    hooks:
      - id: pydocstyle
